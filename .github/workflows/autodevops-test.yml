name: AutoDevOps Test Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x' # Use the latest Python 3.x version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r weather-forecast-app/requirements.txt
          pip install pytest # Ensure pytest is installed for running tests

      - name: Run tests
        run: |
          cd weather-forecast-app
          pytest

      - name: Notify AutoDevOps on failure
        if: failure()
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          # github.event.head_commit is primarily available for push events.
          # For pull_request events, COMMIT_MSG and updated_at might be empty or refer to the merge commit if available.
          # This behavior aligns with the provided example's variable usage.
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          
          # Infinite loop prevention for auto-fix branches or specific commit messages
          if [[ "$BRANCH" == fix/agent-* ]] || echo "$COMMIT_MSG" | grep -qE "\[Auto-Fix\]|fix: AutoDevOps Agent|docs: Add incident|fix: Self-Healing Agent"; then
            echo "Skipping AutoDevOps notification for auto-fix branch or commit."
            exit 0
          fi
          
          # Install jq if not already present (ubuntu-latest usually has it)
          sudo apt-get update && sudo apt-get install -y jq
          
          # Construct the JSON payload using jq for robustness
          PAYLOAD=$(jq -n \
            --arg workflow_name "${{ github.workflow }}" \
            --arg head_branch "$BRANCH" \
            --arg updated_at "${{ github.event.head_commit.timestamp }}" \
            --arg repo_full_name "${{ github.repository }}" \
            '{
              workflow_run: {
                name: $workflow_name,
                head_branch: $head_branch,
                updated_at: $updated_at
              },
              repository: {
                full_name: $repo_full_name
              },
              action: "completed",
              conclusion: "failure"
            }')
          
          echo "Sending payload: $PAYLOAD"
          
          curl -s -X POST -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
          "https://autodevops-merge-worker-617819190113.asia-northeast1.run.app/webhook/github_actions?user_id=TFgfQCigwFOeJMaUKsSW6N1zUsw1"