name: AutoDevOps Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # リポジトリ構造からPythonプロジェクトと推測し、Python 3.10 を使用

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r weather-forecast-app/requirements.txt
        pip install pytest # テスト実行に必要なpytestをインストール

    - name: Run tests
      working-directory: weather-forecast-app # weather-forecast-app ディレクトリに移動してテストを実行
      run: pytest tests/

    - name: Notify AutoDevOps on failure
      if: failure()
      run: |
        BRANCH="${ github.head_ref || github.ref_name }"
        COMMIT_MSG="${ github.event.head_commit.message }"
        if [[ "$BRANCH" == fix/agent-* ]] || echo "$COMMIT_MSG" | grep -qE "\[Auto-Fix\]|fix: AutoDevOps Agent|docs: Add incident|fix: Self-Healing Agent"; then
          echo "Skipping AutoDevOps notification for auto-fix branch or commit."
          exit 0
        fi
        curl -s -X POST -H "Content-Type: application/json" \
        -d "{\"workflow_run\": {\"name\": \"${ github.workflow }\", \"head_branch\": \"$BRANCH\", \"updated_at\": \"${ github.event.head_commit.timestamp }\"}, \"repository\": {\"full_name\": \"${ github.repository }\"}, \"action\": \"completed\", \"conclusion\": \"failure\"}" \
        "https://autodevops-merge-worker-617819190113.asia-northeast1.run.app/webhook/github_actions?user_id=7cWF7aydiYO93EFYIl5mtcFQoqg1"