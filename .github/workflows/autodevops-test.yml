name: AutoDevOps Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x' # Use the latest stable Python 3 version

      - name: Install dependencies
        working-directory: weather-forecast-app # Change directory to the application root
        run: |
          python -m pip install --upgrade pip
          pip install pytest # Install pytest for running tests
          pip install -r requirements.txt

      - name: Run tests
        working-directory: weather-forecast-app # Change directory to the application root
        run: |
          pytest tests/

      - name: Notify AutoDevOps on failure
        if: failure()
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          # github.event.head_commit.message and timestamp are primarily for push events.
          # For pull_request events, these might be empty or refer to the merge commit.
          # Adhering to the provided snippet structure.
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          TIMESTAMP="${{ github.event.head_commit.timestamp }}"

          if [[ "$BRANCH" == fix/agent-* ]] || echo "$COMMIT_MSG" | grep -qE "\[Auto-Fix\]|fix: AutoDevOps Agent|docs: Add incident|fix: Self-Healing Agent"; then
            echo "Skipping AutoDevOps notification for auto-fix branch or commit."
            exit 0
          fi
          curl -s -X POST -H "Content-Type: application/json" \
          -d "{\"workflow_run\": {\"name\": \"${{ github.workflow }}\", \"head_branch\": \"$BRANCH\", \"updated_at\": \"$TIMESTAMP\"}, \"repository\": {\"full_name\": \"${{ github.repository }}\"}, \"action\": \"completed\", \"conclusion\": \"failure\"}" \
          "https://autodevops-merge-worker-617819190113.asia-northeast1.run.app/webhook/github_actions?user_id=7cWF7aydiYO93EFYIl5mtcFQoqg1"